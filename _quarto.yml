project:
  type: website
  output-dir: _site
  render:
    - "index.qmd"
    - "**/notebooks/*.ipynb"

website:
  title: "CC3084 · Data Science"
  description: "Ejercicios y proyectos de Ciencia de Datos"
  site-url: "https://vann06.github.io/Data-Science/"
  repo-url: "https://github.com/Vann06/Data-Science"
  reader-mode: true
  navbar:
    left:
      - href: index.qmd
        text: Inicio
    tools:
      - icon: github
        href: https://github.com/Vann06/Data-Science
  sidebar:
    style: floating
    collapse-level: 1
    contents: auto
  page-footer:
    left: "CC3084 · UVG"
    right: "Generado con [Quarto](https://quarto.org/)"

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    toc-title: "Contenido"
    code-fold: show
    code-tools: true
    code-copy: true
    highlight-style: github
    fig-width: 9
    fig-height: 5
    lang: es

# El workflow ejecuta el notebook antes de renderizar el sitio.
execute:
  enabled: false
